<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product – TrendyMart</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.product-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 64px;
  align-items: start;
  margin-bottom: 80px;
}
.product-gallery { position: sticky; top: 88px; }
.main-image {
  border-radius: var(--radius-lg); overflow: hidden;
  background: var(--gray100); aspect-ratio: 1; margin-bottom: 16px;
}
.main-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
.main-image:hover img { transform: scale(1.04); }
.thumb-row { display: flex; gap: 12px; }
.thumb {
  width: 80px; height: 80px; border-radius: var(--radius-sm);
  overflow: hidden; cursor: pointer;
  border: 2px solid var(--gray200); transition: var(--transition);
}
.thumb.active { border-color: var(--coral); }
.thumb img { width: 100%; height: 100%; object-fit: cover; }
.thumb:hover { border-color: var(--navy); }

.product-info {}
.product-breadcrumb { margin-bottom: 20px; }
.product-badges { display: flex; gap: 8px; margin-bottom: 16px; }
.product-title {
  font-family: var(--ff-display); font-size: clamp(24px, 3vw, 36px);
  font-weight: 800; color: var(--navy); line-height: 1.15; margin-bottom: 16px;
}
.product-rating-row {
  display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
  padding-bottom: 20px; border-bottom: 1px solid var(--gray200);
}
.product-rating-row .stars { font-size: 18px; color: var(--gold); }
.rating-text { font-size: 14px; color: var(--gray600); }
.rating-link { color: var(--coral); text-decoration: underline; cursor: pointer; }

.product-price {
  display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px;
}
.product-price .current { font-size: 32px; font-weight: 800; color: var(--navy); }
.product-price .old { font-size: 18px; color: var(--gray400); text-decoration: line-through; }
.product-price .save {
  background: rgba(232,69,69,0.1); color: var(--coral);
  font-size: 13px; font-weight: 700; padding: 4px 10px;
  border-radius: 20px;
}

.product-desc { font-size: 15px; line-height: 1.75; color: var(--gray600); margin-bottom: 28px; }

.variant-section { margin-bottom: 24px; }
.variant-label {
  font-size: 13px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--navy); margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.variant-label span { color: var(--coral); font-weight: 600; text-transform: none; letter-spacing: 0; }

.size-options { display: flex; flex-wrap: wrap; gap: 8px; }
.size-btn {
  min-width: 46px; height: 46px; padding: 0 14px;
  border-radius: var(--radius-sm); border: 1.5px solid var(--gray200);
  background: var(--white); cursor: pointer; font-size: 14px; font-weight: 600;
  color: var(--gray600); transition: var(--transition);
}
.size-btn:hover { border-color: var(--navy); color: var(--navy); }
.size-btn.active { border-color: var(--navy); background: var(--navy); color: #fff; }
.size-btn.oos { opacity: 0.35; cursor: not-allowed; text-decoration: line-through; }

.color-options { display: flex; gap: 10px; }
.color-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 3px solid transparent; cursor: pointer;
  transition: var(--transition); box-shadow: 0 0 0 1px var(--gray200);
}
.color-btn.active { box-shadow: 0 0 0 2px var(--coral), 0 0 0 4px white; }

.qty-cta { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.qty-selector {
  display: flex; align-items: center;
  border: 1.5px solid var(--gray200); border-radius: var(--radius-sm);
  overflow: hidden;
}
.qty-btn {
  width: 40px; height: 50px; background: var(--gray50); border: none;
  cursor: pointer; font-size: 18px; font-weight: 600; color: var(--navy);
  transition: var(--transition);
}
.qty-btn:hover { background: var(--gray200); }
.qty-display {
  width: 48px; height: 50px; text-align: center;
  border: none; border-left: 1.5px solid var(--gray200); border-right: 1.5px solid var(--gray200);
  font-size: 15px; font-weight: 700; color: var(--navy); background: var(--white);
  outline: none;
}
.btn-add-cart { flex: 1; justify-content: center; height: 50px; font-size: 15px; }
.btn-wishlist {
  width: 50px; height: 50px; border-radius: var(--radius-sm);
  border: 1.5px solid var(--gray200); background: var(--white);
  cursor: pointer; font-size: 22px; transition: var(--transition);
}
.btn-wishlist:hover { border-color: var(--coral); background: rgba(232,69,69,0.05); }

.buy-now-btn { width: 100%; justify-content: center; height: 50px; font-size: 15px; margin-bottom: 20px; background: var(--navy); color: #fff; }
.buy-now-btn:hover { background: var(--navy2); }

.product-perks { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.perk {
  display: flex; align-items: center; gap: 10px;
  padding: 12px; background: var(--gray50); border-radius: var(--radius-sm);
  font-size: 13px; color: var(--gray600);
}
.perk-icon { font-size: 20px; }

.accordion-item { border-bottom: 1px solid var(--gray200); }
.accordion-header {
  width: 100%; background: none; border: none; cursor: pointer;
  padding: 16px 0; display: flex; justify-content: space-between; align-items: center;
  font-size: 14px; font-weight: 700; color: var(--navy); text-align: left;
  transition: var(--transition);
}
.accordion-header:hover { color: var(--coral); }
.accordion-arrow { transition: transform 0.3s ease; font-size: 12px; }
.accordion-item.open .accordion-arrow { transform: rotate(180deg); }
.accordion-body {
  max-height: 0; overflow: hidden;
  transition: max-height 0.3s ease, padding 0.3s ease;
}
.accordion-body-inner {
  padding: 0 0 16px; font-size: 14px; line-height: 1.8; color: var(--gray600);
}
.accordion-item.open .accordion-body { max-height: 300px; }

.reviews-summary {
  display: grid; grid-template-columns: auto 1fr; gap: 48px;
  align-items: center; margin-bottom: 40px;
}
.rating-big {
  text-align: center; background: var(--gray50);
  border-radius: var(--radius-md); padding: 32px;
}
.rating-big .num {
  font-family: var(--ff-display); font-size: 56px; font-weight: 800; color: var(--navy);
  line-height: 1;
}
.rating-big .stars { font-size: 24px; color: var(--gold); margin: 8px 0; }
.rating-big .count { font-size: 13px; color: var(--gray400); }

.rating-bars { display: flex; flex-direction: column; gap: 10px; }
.rating-bar-row { display: flex; align-items: center; gap: 12px; }
.rating-bar-label { font-size: 13px; color: var(--gray600); width: 32px; flex-shrink: 0; }
.rating-bar-track { flex: 1; height: 8px; background: var(--gray200); border-radius: 4px; overflow: hidden; }
.rating-bar-fill { height: 100%; border-radius: 4px; background: var(--gold); }
.rating-bar-count { font-size: 13px; color: var(--gray400); width: 28px; flex-shrink: 0; }

.review-card {
  background: var(--white); border: 1px solid var(--gray200);
  border-radius: var(--radius-md); padding: 24px; margin-bottom: 16px;
}
.review-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.reviewer { display: flex; align-items: center; gap: 12px; }
.reviewer-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--gray100); display: flex; align-items: center; justify-content: center; font-size: 20px;
}
.reviewer-name { font-size: 14px; font-weight: 700; color: var(--navy); }
.reviewer-meta { font-size: 12px; color: var(--gray400); }
.review-stars { font-size: 14px; color: var(--gold); }
.review-title { font-size: 15px; font-weight: 600; color: var(--navy); margin-bottom: 8px; }
.review-text { font-size: 14px; line-height: 1.7; color: var(--gray600); }

.related-section { padding-top: 64px; border-top: 1px solid var(--gray200); }

@media (max-width: 1024px) {
  .product-layout { grid-template-columns: 1fr; gap: 40px; }
  .product-gallery { position: static; }
}
@media (max-width: 768px) {
  .product-perks { grid-template-columns: 1fr; }
  .reviews-summary { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div id="navbar-root"></div>

<section class="section-sm">
  <div class="container">
    <div class="product-layout" id="product-layout">
      <div style="text-align:center;padding:80px;color:var(--gray400);grid-column:1/-1">Loading product…</div>
    </div>

    <div id="reviews-section"></div>

    <div class="related-section">
      <div class="section-header-flex">
        <div>
          <div class="section-label">You Might Also Like</div>
          <h2 class="section-title">Related Products</h2>
        </div>
        <a href="shop.html" class="btn btn-outline btn-sm">View All</a>
      </div>
      <div class="products-grid-4" id="related-products"></div>
    </div>
  </div>
</section>

<div id="newsletter-root"></div>
<div id="footer-root"></div>

<script src="../js/main.js"></script>
<script src="../js/layout.js"></script>
<script>
document.getElementById('navbar-root').innerHTML = renderNavbar('Shop');
document.getElementById('footer-root').innerHTML = renderFooter();
document.getElementById('newsletter-root').innerHTML = renderNewsletter();

const params = new URLSearchParams(window.location.search);
const productId = parseInt(params.get('id')) || 1;
const product = PRODUCTS.find(p => p.id === productId) || PRODUCTS[0];
const discount = product.oldPrice ? Math.round((1 - product.price / product.oldPrice) * 100) : null;
const savings = product.oldPrice ? product.oldPrice - product.price : null;

const galleryImgs = [
  product.img,
  product.img.replace('w=600', 'w=601'),
  product.img.replace('w=600', 'w=602'),
  product.img.replace('w=600', 'w=603'),
];

document.title = `${product.name} – TrendyMart`;

document.getElementById('product-layout').innerHTML = `
  <div class="product-gallery">
    <div class="main-image">
      <img src="${product.img}" alt="${product.name}" id="mainImg">
    </div>
    <div class="thumb-row">
      ${galleryImgs.map((img,i) => `
        <div class="thumb ${i===0?'active':''}" onclick="setMainImg('${img}',this)">
          <img src="${img}" alt="View ${i+1}">
        </div>`).join('')}
    </div>
  </div>

  <div class="product-info">
    <div class="breadcrumb product-breadcrumb">
      <a href="../index.html">Home</a>
      <span class="sep">›</span>
      <a href="shop.html">Shop</a>
      <span class="sep">›</span>
      <a href="shop.html?cat=${encodeURIComponent(product.category)}">${product.category}</a>
      <span class="sep">›</span>
      <span>${product.name}</span>
    </div>

    <div class="product-badges">
      ${product.badge ? `<span class="badge badge-${product.badge}">${product.badge}</span>` : ''}
      <span class="badge" style="background:rgba(16,185,129,0.1);color:#065f46">✓ In Stock</span>
    </div>

    <h1 class="product-title">${product.name}</h1>

    <div class="product-rating-row">
      <span class="stars">${renderStars(product.rating)}</span>
      <span class="rating-text">${product.rating} · <span class="rating-link">${product.reviews} reviews</span></span>
      <span style="color:var(--gray200)">|</span>
      <span style="font-size:13px;color:#10b981;font-weight:600">✓ 2.4k+ sold</span>
    </div>

    <div class="product-price">
      <span class="current">${formatPrice(product.price)}</span>
      ${product.oldPrice ? `<span class="old">${formatPrice(product.oldPrice)}</span>` : ''}
      ${discount ? `<span class="save">Save ${discount}% (${formatPrice(savings)})</span>` : ''}
    </div>

    <p class="product-desc">${product.description} Crafted with attention to detail, this piece is designed to elevate your wardrobe and keep you looking stylish season after season.</p>

    <div class="variant-section">
      <div class="variant-label">Size <span id="selectedSize">Select a size</span></div>
      <div class="size-options">
        ${['XS','S','M','L','XL','XXL'].map((s,i) =>
          `<button class="size-btn ${i===0?'oos':''}" onclick="selectSize(this,'${s}')">${s}</button>`
        ).join('')}
      </div>
    </div>

    <div class="variant-section">
      <div class="variant-label">Color <span id="selectedColor">Classic</span></div>
      <div class="color-options">
        ${[['#1A1A2E','Classic Navy'],['#E84545','Coral Red'],['#C9A84C','Gold'],['#6B7280','Storm Grey'],['#F8F6F1','Cream']].map(([c,n],i) =>
          `<button class="color-btn ${i===0?'active':''}" style="background:${c}" title="${n}" onclick="selectColor(this,'${n}')"></button>`
        ).join('')}
      </div>
    </div>

    <div class="qty-cta">
      <div class="qty-selector">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <input class="qty-display" type="number" id="qtyInput" value="1" min="1" max="10" readonly>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
      <button class="btn btn-primary btn-add-cart" onclick="addToCartWithQty()">🛒 Add to Cart</button>
      <button class="btn-wishlist" id="wishBtn" onclick="toggleWish()" title="Add to Wishlist">🤍</button>
    </div>
    <button class="btn buy-now-btn" onclick="buyNow()">⚡ Buy Now</button>

    <div class="product-perks">
      <div class="perk"><span class="perk-icon">🚚</span>Free delivery above ₹999</div>
      <div class="perk"><span class="perk-icon">↩️</span>30-day easy returns</div>
      <div class="perk"><span class="perk-icon">🔒</span>Secure checkout</div>
      <div class="perk"><span class="perk-icon">🎁</span>Gift wrapping available</div>
    </div>

    <div class="accordion">
      ${[
        ['Product Details', 'Material: Premium quality fabric<br>Fit: Regular<br>Care: Machine wash cold, tumble dry low<br>Origin: Made in India<br>SKU: TM-'+(1000+product.id)],
        ['Size Guide', 'XS: Bust 80-84cm, Waist 62-66cm<br>S: Bust 84-88cm, Waist 66-70cm<br>M: Bust 88-92cm, Waist 70-74cm<br>L: Bust 92-96cm, Waist 74-78cm<br>XL: Bust 96-100cm, Waist 78-82cm'],
        ['Shipping & Returns', 'Standard delivery 3-5 business days. Express delivery available. Free returns within 30 days. Items must be unworn and in original packaging with tags attached.'],
      ].map(([t,c],i) => `
        <div class="accordion-item ${i===0?'open':''}">
          <button class="accordion-header" onclick="toggleAccordion(this)">
            ${t} <span class="accordion-arrow">▼</span>
          </button>
          <div class="accordion-body">
            <div class="accordion-body-inner">${c}</div>
          </div>
        </div>`).join('')}
    </div>
  </div>
`;

const reviews = [
  { name:'Priya S.', date:'2 weeks ago', rating:5, title:'Perfect fit, beautiful quality!', text:'I ordered the M size and it fits like a dream. The fabric is premium and the color is exactly as shown. Delivery was fast too!', avatar:'👩' },
  { name:'Arjun P.', date:'1 month ago', rating:4, title:'Great product, minor delay', text:'Quality is excellent. I\'m very happy with this purchase. Would have given 5 stars but delivery took slightly longer than expected.', avatar:'👨' },
  { name:'Sneha G.', date:'3 weeks ago', rating:5, title:'Absolutely love it!', text:'This is the third time I\'ve bought from TrendyMart and they never disappoint. Amazing quality, great packaging.', avatar:'👩‍🦱' },
];

document.getElementById('reviews-section').innerHTML = `
  <div style="padding-top:64px;border-top:1px solid var(--gray200)">
    <div class="section-label">Customer Reviews</div>
    <h2 class="section-title" style="margin-top:8px;margin-bottom:32px">What Buyers Say</h2>
    <div class="reviews-summary">
      <div class="rating-big">
        <div class="num">${product.rating}</div>
        <div class="stars">★★★★★</div>
        <div class="count">${product.reviews} reviews</div>
      </div>
      <div class="rating-bars">
        ${[[5,78],[4,15],[3,5],[2,1],[1,1]].map(([s,pct]) => `
          <div class="rating-bar-row">
            <span class="rating-bar-label">${s}★</span>
            <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${pct}%"></div></div>
            <span class="rating-bar-count">${pct}%</span>
          </div>`).join('')}
      </div>
    </div>
    ${reviews.map(r => `
      <div class="review-card reveal">
        <div class="review-header">
          <div class="reviewer">
            <div class="reviewer-avatar">${r.avatar}</div>
            <div>
              <div class="reviewer-name">${r.name}</div>
              <div class="reviewer-meta">${r.date} · Verified Buyer</div>
            </div>
          </div>
          <div class="review-stars">${'★'.repeat(r.rating)}</div>
        </div>
        <div class="review-title">${r.title}</div>
        <div class="review-text">${r.text}</div>
      </div>`).join('')}
  </div>`;

const related = PRODUCTS.filter(p => p.category === product.category && p.id !== product.id).slice(0,4);
document.getElementById('related-products').innerHTML = related.map(renderProductCard).join('');
initReveal();

function setMainImg(src, el) {
  document.getElementById('mainImg').src = src;
  document.querySelectorAll('.thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}
function selectSize(btn, size) {
  if (btn.classList.contains('oos')) return;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('selectedSize').textContent = size;
}
function selectColor(btn, name) {
  document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('selectedColor').textContent = name;
}
function changeQty(delta) {
  const input = document.getElementById('qtyInput');
  const newVal = Math.max(1, Math.min(10, +input.value + delta));
  input.value = newVal;
}
function addToCartWithQty() {
  const qty = +document.getElementById('qtyInput').value;
  Cart.add(product.id, qty);
}
function buyNow() {
  Cart.add(product.id, +document.getElementById('qtyInput').value);
  window.location = 'cart.html';
}
function toggleWish() {
  Wishlist.toggle(product.id);
  document.getElementById('wishBtn').textContent = Wishlist.has(product.id) ? '❤️' : '🤍';
}
function toggleAccordion(header) {
  const item = header.closest('.accordion-item');
  const isOpen = item.classList.contains('open');
  document.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('open'));
  if (!isOpen) item.classList.add('open');
}
</script>
</body>
</html>
